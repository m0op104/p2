name: Node.js CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Set up Project Node.js Version
      uses: actions/setup-node@v6
      with:
        # 💡 Explicitly force the specific Node version your code needs
        node-version: '20' 
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: npm run build --if-present

    - name: Run Tests
      run: npm test --if-present
